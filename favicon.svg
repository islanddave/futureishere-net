<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    Claude Helper Portal — Favicon
    Theme: TESOL / English Instruction
    Style: Unified Style Guide V3 palette
    Open book, two pages, gold spine, sage bg
  -->

  <!-- App icon background — sage -->
  <rect width="32" height="32" rx="6.5" fill="#5e9180"/>

  <!-- Left page of open book (slight perspective lean) -->
  <path d="M4.5 8.5
           C4.5 8.5 14 10 14 11
           L14 24.5
           C14 24.5 4.5 22.5 4.5 21.5
           Z"
        fill="white" opacity="0.93"/>

  <!-- Right page of open book -->
  <path d="M27.5 8.5
           C27.5 8.5 18 10 18 11
           L18 24.5
           C18 24.5 27.5 22.5 27.5 21.5
           Z"
        fill="white" opacity="0.93"/>

  <!-- Spine — gold accent -->
  <rect x="14.5" y="9.5" width="3" height="16" rx="1.5" fill="#c49520"/>

  <!-- Text lines — left page, sage-light -->
  <rect x="6.5"  y="13.5" width="6"   height="1.3" rx="0.65" fill="#a8ccbf"/>
  <rect x="6.5"  y="16.5" width="5.5" height="1.3" rx="0.65" fill="#a8ccbf"/>
  <rect x="6.5"  y="19.5" width="6"   height="1.3" rx="0.65" fill="#a8ccbf"/>

  <!-- Text lines — right page, sage-light -->
  <rect x="19.5" y="13.5" width="6"   height="1.3" rx="0.65" fill="#a8ccbf"/>
  <rect x="19.5" y="16.5" width="5.5" height="1.3" rx="0.65" fill="#a8ccbf"/>
  <rect x="19.5" y="19.5" width="6"   height="1.3" rx="0.65" fill="#a8ccbf"/>

  <!-- Terra accent dot — top right, implies "speech / language" -->
  <circle cx="26.5" cy="5.5" r="3.5" fill="#c8714a"/>
  <!-- Small "E" glyph in the dot -->
  <text x="26.5" y="8"
        text-anchor="middle"
        font-size="4.5"
        font-weight="800"
        fill="white"
        font-family="Nunito, Arial Rounded MT Bold, sans-serif">E</text>
</svg>
